name: Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# A newer commit on the same branch/PR supersedes an in-flight run.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      # paper-api 1.21.4 is Java 21 bytecode, so the build needs JDK 21+ to read
      # it even though the plugins target 17 (maven-compiler --release 17). 21 is
      # the native runtime for paper-api/MockBukkit here; the local dev JDK (25)
      # produces identical output because --release 17 caps the API surface.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # The 'all' profile is the only one that pulls every module into a single
      # reactor, so this one command runs the entire suite. -Dskip.setup.server
      # skips the initialize-phase antrun step that copies the local dev server's
      # paper.jar, which is absent (and unneeded) on the runner.
      - name: Run the full test suite
        run: mvn -B -P all test -Dskip.setup.server=true
