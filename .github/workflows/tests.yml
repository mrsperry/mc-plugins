name: Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

# A newer commit on the same branch/PR supersedes an in-flight run.
concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      # Everything targets Java 25 (maven-compiler --release 25) and paper-api 1.21.11
      # is Java 25 bytecode, so the runner needs JDK 25.
      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      # The 'all' profile is the only one that pulls every module into a single
      # reactor, so this one command runs the entire suite. -Dskip.setup.server
      # skips the initialize-phase antrun step that copies the local dev server's
      # paper.jar, which is absent (and unneeded) on the runner.
      - name: Run the full test suite
        run: mvn -B -P all test -Dskip.setup.server=true
