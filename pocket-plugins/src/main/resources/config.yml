# All modules are enabled by default. To disable a module, add `enabled: false` to its section.

autobreeding:
  # Delay is in seconds
  min-delay: 0.25
  max-delay: 2
  range: 10

beeplanter:
  search-radius: 4

biomebombs:
  bomb-range: 9
  crafting-output: 4

chunkloaders:
  # Half-width, in chunks, of the square each placed end crystal force-loads.
  # 1 covers a 3x3 (the crystal's chunk plus the ring around it); 0 is its chunk
  # alone. Chunks always load full-height, so this only controls the footprint.
  radius: 1

cobblegenerator:
  # These chances are a weighted ratio
  blocks:
    cobblestone: 1
    stone: 1

concretemixer:
  # Use change is out of 100
  water-use-chance: 5

croptweaks:
  can-blaze-powder-nether-wart: true
  can-bonemeal-sugarcane: true
  can-bonemeal-cactus: true
  can-bonemeal-vines: true
  can-bonemeal-stems: true

dispensery:
  placeable-materials:
    - "anvil"

dyeshears:
  # Dye change is out of 100
  dye-chance: 50

featherplucker:
  # Cooldown is in seconds
  cooldown: 300

igneousgenerator:
  # Conversion time is in seconds
  max-conversion-time: 2

lightningrods:
  # How far from a strike to look for the rod that attracted it; fires are only
  # suppressed when one is found
  search-radius: 2

mobgriefing:
  no-sheep-griefing: true
  no-enderman-griefing: true

mobheads:
  # All chances are percentages
  mob-chance: 0
  mob-player-chance: 2.5
  player-chance: 0
  player-player-chance: 100
  # Percentage points added per level of looting, e.g. a 2.5% mob-player-chance
  # with Looting III drops at 5.5%
  looting-affects-chance: true
  looting-bonus: 1
  # These never drop a head, e.g. "ender_dragon" or "wither"
  excluded-entities: []
  # Skin texture hashes for mobs with no real head item in vanilla; the value is
  # the trailing path of a textures.minecraft.net URL. Creepers, skeletons, wither skeletons, zombies, piglins
  # and the dragon are absent on purpose as they drop their actual vanilla head
  # item instead, so a texture here would be ignored
  #
  # Sourced from Mojang's MHF_* head accounts where they exist, and from the
  # Minecraft-Heads database (https://minecraft-heads.com) for everything newer
  #
  # An entry is either a single hash (one skin for every variant, as below) or a
  # map with a `default` plus per-variant overrides. Variants a mob can have:
  #   cow / pig / chicken:  temperate, warm, cold
  #   sheep:                white, orange, magenta, light_blue, yellow, lime,
  #                         pink, gray, light_gray, cyan, purple, blue, brown,
  #                         green, red, black
  #   mooshroom:            red, brown
  #   wolf:                 pale, ashen, black, chestnut, rusty, snowy, spotted,
  #                         striped, woods
  #   cat:                  tabby, black, red, siamese, british_shorthair,
  #                         calico, persian, ragdoll, white, jellie, all_black
  #   fox:                  red, snow
  #   rabbit:               brown, white, black, black_and_white, gold,
  #                         salt_and_pepper, the_killer_bunny
  #   parrot:               red, blue, green, cyan, gray
