main: com.mrjoshuasperry.pocketplugins.PocketPlugins
name: PocketPlugins
version: ${project.version}
description: A collection of small changes and additions to enhance vanilla gameplay
authors:
  - mrsperry
  - TimPCunningham
api-version: "26.1.2"
permissions:
  pocketplugins.macros.op:
    description: Allows running and viewing command macros flagged op-only
    default: op
  pocketplugins.mobheads.take:
    description: Allows taking heads from the /mobheads catalog
    default: op
